<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>베베박스 2.0 · 운영자</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍼</text></svg>"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="assets/app.css?v=1"/>
<style>
  body{display:block;background:var(--bg)}
  .a-wrap{max-width:1100px;margin:0 auto;padding:24px 18px 70px}
  .a-top{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .a-top h1{font-size:22px;font-weight:800}
  .a-top .sub{font-size:13px;color:var(--sub)}
  .a-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .a-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-l);box-shadow:var(--sh-s)}
  .a-card .hd{padding:14px 18px;font-weight:800;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .a-card .hd .muted{font-size:12px;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:11px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{font-size:12px;color:var(--sub);background:#faf7f3;font-weight:700;white-space:nowrap}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr.click{cursor:pointer}
  tbody tr.click:hover{background:#fff8f3}
  .a-layout{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}
  @media(min-width:880px){.a-layout{grid-template-columns:1.2fr 1fr}}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .gate{max-width:360px;margin:90px auto;text-align:center}
  .funnel-step{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .kidmiss{color:var(--pink);font-weight:700}
</style>
</head>
<body>
  <!-- 게이트 -->
  <div class="gate card" id="gate">
    <div style="font-size:40px">🛠️</div>
    <h1 class="h-l" style="margin:10px 0 4px">운영자 대시보드</h1>
    <p class="sub">관리자 키를 입력하세요</p>
    <input class="field" id="key" placeholder="admin key (데모: 아무 값)" />
    <button class="btn primary" id="enter" style="margin-top:12px">들어가기</button>
    <p class="muted" style="margin-top:10px">데모 빌드 — 실제 키 검증은 배포 시 서버 연결</p>
  </div>

  <!-- 대시보드 -->
  <div class="a-wrap hidden" id="dash"></div>

<script src="assets/store.js?v=1"></script>
<script src="assets/admin.js?v=1"></script>
</body>
</html>
