# Render.com — 의존성 없는 Node 정적 서버로 구동
# New + > Blueprint > 이 저장소 선택 시 자동 인식.
# (수동 웹 서비스로 만들었다면: Build Command 비우고, Start Command = "node server.js")
services:
  - type: web
    name: bebebox-next
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    autoDeploy: true
