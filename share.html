<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>콩이의 하루 · 베베박스</title>
<meta property="og:title" content="콩이의 하루 · 베베박스"/>
<meta property="og:description" content="콩이에게 선물하고 함께 키워요 🎁"/>
<meta name="og:image" content="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='315'><rect width='600' height='315' fill='%23ff9e7a'/><text x='300' y='190' font-size='150' text-anchor='middle'>🍼</text></svg>"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍼</text></svg>"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="assets/app.css?v=1"/>
<style>
  .s-hero{position:relative;height:240px;overflow:hidden}
  .s-hero .bg{position:absolute;inset:0;object-fit:cover;width:100%;height:100%}
  .s-hero .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.55))}
  .s-hero .info{position:absolute;left:18px;bottom:16px;right:18px;color:#fff;z-index:2}
  .s-hero .info .av{width:60px;height:60px;border-radius:50%;border:2.5px solid rgba(255,255,255,.85);object-fit:cover}
  .s-hero .info h1{font-size:21px;font-weight:800;margin-top:8px}
  .s-hero .info p{font-size:13px;opacity:.9}
  .canvas-confetti{position:fixed;inset:0;pointer-events:none;z-index:90}
</style>
</head>
<body>
<div class="phone">
  <div class="s-hero">
    <img class="bg" id="s-cover"/><div class="grad"></div>
    <div class="info"><img class="av" id="s-av"/><h1 id="s-name">콩이의 하루</h1><p id="s-age">8개월 · 성장 기록 중 👶</p></div>
  </div>

  <div class="wrap">
    <div class="sec-title"><h2>📔 콩이의 기록</h2></div>
    <div id="s-feed"></div>
    <div class="card center" style="margin:18px 0;background:linear-gradient(135deg,#fff5ee,#f0ecff)">
      <b class="h-m">나도 우리 아이 기록을 시작할까요?</b>
      <p class="sub" style="margin-top:6px">베베박스에서 육아일기 쓰고 선물도 받아요</p>
      <a class="btn primary" href="index.html" style="margin-top:14px">나도 시작하기 →</a>
    </div>
  </div>

  <button class="fab" id="s-fab">🎁 선물하기</button>

  <!-- 선물 오버레이 -->
  <div class="sheet" id="gift-sheet"><div class="bd" data-close></div>
    <div class="panel" id="gift-body"></div></div>
  <!-- 선물 플로우 -->
  <div class="sheet" id="flow-sheet"><div class="bd" data-close></div>
    <div class="panel" id="flow-body"></div></div>

  <canvas class="canvas-confetti" id="confetti"></canvas>
</div>
<script src="assets/store.js?v=1"></script>
<script src="assets/share.js?v=1"></script>
</body>
</html>
